<!DOCTYPE html>
<html>
<head>
<title>Velan Enterprises - Rental System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
margin:0;
background:#e6f2ff;
}

nav{
background:#0047ab;
color:#ffd700;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
padding:20px;
gap:20px;
}

.box{
background:white;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.bike{
border-bottom:1px solid #ccc;
padding:10px;
}

button{
background:#0047ab;
color:#ffd700;
border:none;
padding:6px;
margin-top:5px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#003380;
}

input{
width:100%;
margin-top:5px;
padding:5px;
}

.bike span{
display:block;
margin-top:5px;
font-size:14px;
font-weight:bold;
}

.chart-box{
width:90%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<nav>Velan Enterprises - Rental System</nav>

<div class="container">

<div class="box">
<h2>Available Bikes</h2>
<div id="available"></div>
</div>

<div class="box">
<h2>Rented Bikes</h2>
<div id="rented"></div>
</div>

</div>

<div class="chart-box">
<h2>Rental Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

let bikes = ["Ray Z 8681 (15)","Activa 5369 (18)","Dio 3353 (19)","Pleasure plus 3431 (21)","Zest 2751 (19)","Activa 8895 (22)","Ray ZR"];

let rented = JSON.parse(localStorage.getItem("rented")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

function load(){

let a = document.getElementById("available");
let r = document.getElementById("rented");

a.innerHTML = "";
r.innerHTML = "";

// Available Bikes
bikes.forEach((b,i)=>{

let found = rented.find(x=>x.name===b);

if(!found){

a.innerHTML += `
<div class="bike">
<b>${b}</b><br>

Rent Date & Time:
<input type="datetime-local" id="r${i}">

Due Date & Time:
<input type="datetime-local" id="d${i}">

<button onclick="rent('${b}',${i})">Rent</button>
</div>
`;

}

});

// Rented Bikes with EDIT OPTION
rented.forEach((b,i)=>{

let now = new Date();
let due = new Date(b.due);

let diffHours = (due - now) / (1000 * 60 * 60);

let message = "";
let color = "";

if(diffHours < 0){
message = "❌ Overdue - Return immediately";
color = "red";
}
else if(diffHours <= 24){
message = "🚨 Due within 24 hours";
color = "orange";
}
else if(diffHours <= 48){
message = "⚠️ Due within 2 days";
color = "goldenrod";
}
else{
message = "✅ Active Rental";
color = "green";
}

r.innerHTML += `
<div class="bike">
<b>${b.name}</b><br>

Rent: ${new Date(b.rent).toLocaleString()}<br>
Due: ${new Date(b.due).toLocaleString()}<br>

<span style="color:${color};">
${message}
</span>

<br><br>
<b>Edit Due Date:</b>
<input type="datetime-local" id="edit${i}" value="${b.due}">

<button onclick="updateDue(${i})">Update</button>

<br><br>
<button onclick="back(${i})">Returned</button>
</div>
`;

});

drawChart();

}

// Rent Bike
function rent(name,i){

let rent = document.getElementById("r"+i).value;
let due = document.getElementById("d"+i).value;

if(!rent || !due){
alert("Select date & time");
return;
}

rented.push({name:name,rent:rent,due:due});

history.push({name:name});

localStorage.setItem("history", JSON.stringify(history));
localStorage.setItem("rented",JSON.stringify(rented));

load();

}

// Update Due Date
function updateDue(i){

let newDue = document.getElementById("edit"+i).value;

if(!newDue){
alert("Select new due date");
return;
}

rented[i].due = newDue;

localStorage.setItem("rented", JSON.stringify(rented));

alert("✅ Due date updated successfully!");

load();

}

// Return Bike
function back(i){

if(confirm("Returned?")){
rented.splice(i,1);
localStorage.setItem("rented",JSON.stringify(rented));
load();
}

}

// Graph
function drawChart(){

let counts = {};

history.forEach(b=>{
counts[b.name] = (counts[b.name] || 0) + 1;
});

let labels = Object.keys(counts);
let data = Object.values(counts);

if(window.chartObj){
window.chartObj.destroy();
}

let ctx = document.getElementById("chart").getContext("2d");

window.chartObj = new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Total Rentals',
data:data
}]
}
});

}

window.onload = load;

</script>

</body>
</html>
