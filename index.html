<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velan Enterprises - Bike Rental</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0a1f44;
    color: white;
    margin: 0;
}

h1, h2 {
    color: yellow;
    text-align: center;
}

.container {
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

.box {
    width: 45%;
    background: #132f63;
    padding: 15px;
    border-radius: 10px;
}

.bike {
    background: #1e3f7a;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

.overdue {
    background: red !important;
}

input, button {
    margin-top: 5px;
    padding: 5px;
    border-radius: 5px;
    border: none;
}

button {
    background-color: yellow;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

.reminder-btn {
    display: block;
    margin: 10px auto;
}
</style>
</head>

<body>

<h1>Velan Enterprises - Bike Rental</h1>

<button class="reminder-btn" onclick="checkReminders()">🔔 Check Reminders</button>

<div class="container">

<div class="box">
    <h2>Available Bikes</h2>
    <div id="availableBikes"></div>
</div>

<div class="box">
    <h2>Rented Bikes</h2>
    <div id="rentedBikes"></div>
</div>

</div>

<script>

// ✅ GOOGLE SHEET URL
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzovJHYg7Fh8IPzt7nUEBTvt3XxUE0zF7i0xtbbdRRhMti3tUHY7eyA6rEeTVjTE1YQ2Q/exec";

// ✅ BIKE LIST
let availableBikes = [
    "Ray Z 8681 (VE001)",
    "Activa 5369 (VE002)",
    "Dio 3353 (VE003)",
    "Pleasure Plus 3431 (VE004)",
    "Zest 2751 (VE005)",
    "Activa 8895 (VE006)",
    "Ray ZR 3103 (VE007)",
    "Jupiter 4707 (VE008)",
    "Activa 0325 (VE009)"
];

let rentedBikes = [];

// SAVE TO GOOGLE SHEET
function saveToSheet(data) {
    fetch(SHEET_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data)
    })
    .then(() => console.log("Saved"))
    .catch(err => console.log(err));
}

// RENDER AVAILABLE
function renderAvailable() {
    let html = "";
    availableBikes.forEach((bike, i) => {
        html += `
        <div class="bike">
            <b>${bike}</b><br>

            Rent Date: <input type="date" id="rd${i}">
            Time: <input type="time" id="rt${i}"><br>

            Due Date: <input type="date" id="dd${i}">
            Time: <input type="time" id="dt${i}"><br>

            <button onclick="rentBike(${i})">Rent</button>
        </div>`;
    });
    document.getElementById("availableBikes").innerHTML = html;
}

// RENT
function rentBike(i) {
    let rentDate = document.getElementById(`rd${i}`).value;
    let rentTime = document.getElementById(`rt${i}`).value;
    let dueDate = document.getElementById(`dd${i}`).value;
    let dueTime = document.getElementById(`dt${i}`).value;

    if (!rentDate || !rentTime || !dueDate || !dueTime) {
        alert("Fill all fields");
        return;
    }

    let bike = availableBikes.splice(i,1)[0];

    let data = {
        name: bike,
        rentDate,
        rentTime,
        dueDate,
        dueTime,
        status: "Rented"
    };

    rentedBikes.push({...data, editing:false});

    saveToSheet(data);

    renderAvailable();
    renderRented();
}

// RETURN
function returnBike(i) {
    let bike = rentedBikes.splice(i,1)[0];
    availableBikes.push(bike.name);

    saveToSheet({
        name: bike.name,
        rentDate: bike.rentDate,
        rentTime: bike.rentTime,
        dueDate: bike.dueDate,
        dueTime: bike.dueTime,
        status: "Returned"
    });

    renderAvailable();
    renderRented();
}

// CHECK OVERDUE
function isOverdue(b) {
    return new Date() > new Date(`${b.dueDate}T${b.dueTime}`);
}

// CHECK 8 HR REMINDER
function isDueSoon(b) {
    let diff = (new Date(`${b.dueDate}T${b.dueTime}`) - new Date())/(1000*60*60);
    return diff <= 8 && diff > 0;
}

// RENDER RENTED
function renderRented() {
    let html="";
    rentedBikes.forEach((b,i)=>{
        let cls = isOverdue(b) ? "overdue" : "";

        html += `
        <div class="bike ${cls}">
            <b>${b.name}</b><br>
            Rent: ${b.rentDate} ${b.rentTime}<br>
            Due: ${b.dueDate} ${b.dueTime}<br>

            ${isOverdue(b)?"🔴 OVERDUE":""}
            ${isDueSoon(b)?"<br>🟡 Due within 8 hrs":""}

            <br>
            <button onclick="returnBike(${i})">Return</button>
        </div>`;
    });

    document.getElementById("rentedBikes").innerHTML = html;
}

// REMINDER ALERT
function checkReminders() {
    let msg = "";

    rentedBikes.forEach(b=>{
        if (isDueSoon(b)) msg += "🟡 Due Soon: " + b.name + "\n";
        if (isOverdue(b)) msg += "🔴 Overdue: " + b.name + "\n";
    });

    alert(msg || "No reminders ✅");
}

// AUTO CHECK
setInterval(() => {
    renderRented();
}, 60000);

// LOAD
renderAvailable();
renderRented();

</script>

</body>
</html>
