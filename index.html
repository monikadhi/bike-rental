<!DOCTYPE html>
<html>
<head>
<title>Velan Enterprises - Rental System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
margin:0;
background:#e6f2ff; /* ✅ Plain background */
}

nav{
background:#0047ab;
color:#ffd700;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
padding:20px;
gap:20px;
}

.box{
background:white;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.bike{
border-bottom:1px solid #ccc;
padding:10px;
}

button{
background:#0047ab;
color:#ffd700;
border:none;
padding:6px;
margin-top:5px;
cursor:pointer;
border-radius:5px;
}

input{
width:100%;
margin-top:5px;
padding:5px;
}

.bike span{
display:block;
margin-top:5px;
font-size:14px;
font-weight:bold;
}

.chart-box{
width:90%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<nav>Velan Enterprises - Rental System</nav>

<div class="container">

<div class="box">
<h2>Available Bikes</h2>
<div id="available"></div>
</div>

<div class="box">
<h2>Rented Bikes</h2>
<div id="rented"></div>
</div>

</div>

<div class="chart-box">
<h2>Rental Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwhIGPI7SPCgDIwtcbUURCXLvKM_DQDk28SqMh_kDzj4g9WzOmhbSuckmRxL3qK0KrM/exec";

let bikes = ["Ray Z 8681 (15)","Activa 5369 (18)","Dio 3353 (19)","Pleasure plus 3431 (21)","Zest 2751 (19)","Activa 8895 (22)","Ray ZR"];

let rented = [];
let history = JSON.parse(localStorage.getItem("history")) || [];

async function loadFromSheet(){
let res = await fetch(API);
rented = await res.json();
load();
}

function load(){

let a = document.getElementById("available");
let r = document.getElementById("rented");

a.innerHTML = "";
r.innerHTML = "";

// Available
bikes.forEach((b,i)=>{
let found = rented.find(x=>x.name===b);

if(!found){
a.innerHTML += `
<div class="bike">
<b>${b}</b><br>

Rent Date & Time:
<input type="datetime-local" id="r${i}">

Due Date & Time:
<input type="datetime-local" id="d${i}">

<button onclick="rent('${b}',${i})">Rent</button>
</div>
`;
}
});

// Rented
rented.forEach((b,i)=>{

let now = new Date();
let due = new Date(b.due);

let diff = (due - now)/(1000*60*60);

let msg="",color="";

if(diff<0){msg="❌ Overdue";color="red";}
else if(diff<=24){msg="🚨 Due within 24 hrs";color="orange";}
else if(diff<=48){msg="⚠️ Due within 2 days";color="goldenrod";}
else{msg="✅ Active";color="green";}

r.innerHTML += `
<div class="bike">

<b>${b.name}</b><br>

<div id="view${i}">
Rent: ${new Date(b.rent).toLocaleString()}<br>
Due: ${new Date(b.due).toLocaleString()}
</div>

<div id="edit${i}" style="display:none;">
<input type="datetime-local" id="er${i}" value="${b.rent}">
<input type="datetime-local" id="ed${i}" value="${b.due}">
</div>

<span style="color:${color};">${msg}</span><br><br>

<button onclick="edit(${i})">Edit</button>
<button onclick="save(${i})" id="save${i}" style="display:none;">Save</button>

<br><br>
<button onclick="back(${i})">Returned</button>

</div>
`;
});

drawChart();
}

// Rent
async function rent(name,i){

let rent = document.getElementById("r"+i).value;
let due = document.getElementById("d"+i).value;

if(!rent || !due){
alert("Select date");
return;
}

await fetch(API,{
method:"POST",
body: JSON.stringify({name,rent,due})
});

history.push({name});
localStorage.setItem("history",JSON.stringify(history));

loadFromSheet();
}

// Edit
function edit(i){
document.getElementById("view"+i).style.display="none";
document.getElementById("edit"+i).style.display="block";
document.getElementById("save"+i).style.display="inline";
}

// Save
async function save(i){

let rent = document.getElementById("er"+i).value;
let due = document.getElementById("ed"+i).value;

await fetch(API,{
method:"POST",
body: JSON.stringify({
row: rented[i].row,
name: rented[i].name,
rent,
due,
_method:"PUT"
})
});

loadFromSheet();
}

// Return
async function back(i){

if(confirm("Returned?")){
await fetch(API+"?row="+rented[i].row);
loadFromSheet();
}
}

// Graph
function drawChart(){

let count={};

history.forEach(b=>{
count[b.name]=(count[b.name]||0)+1;
});

let labels=Object.keys(count);
let data=Object.values(count);

if(window.chartObj){window.chartObj.destroy();}

let ctx=document.getElementById("chart").getContext("2d");

window.chartObj=new Chart(ctx,{
type:"bar",
data:{labels,datasets:[{label:"Total Rentals",data}]}
});
}

window.onload = loadFromSheet;

</script>

</body>
</html>
